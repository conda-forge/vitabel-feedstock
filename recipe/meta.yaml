{% set name = "vitabel" %}
{% set version = "0.1.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/vitabel-{{ version }}.tar.gz
  sha256: 02f40a19510156922b34a670b305d75857db31e96ecd3c78329c19a106ed4052

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - pandas >=2.2.3
    - numpy >=2.0.0
    - matplotlib-base >=3.9
    - scipy >=1.14.1
    - ipython >=8.23.0
    - pyedflib >=0.1.38
    - vitaldb >=1.4.11
    - ipywidgets >=8.1.5
    - ipympl >=0.9.5
    - ipykernel >=6.9
    - joblib >=1.4.0
    - scikit-learn >=1.5.2
    - typing_extensions >=4.12.2

test:
  imports:
    - vitabel
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/UniGrazMath/vitabel
  summary: A toolbox for plotting and interactively labeling vital data.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/UniGrazMath/vitabel
  doc_url: https://vitabel.readthedocs.io/

extra:
  recipe-maintainers:
    - behackl
